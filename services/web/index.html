<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>minion canvas</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <header>
    <h1>minion canvas</h1>
    <label>tenant <input id="tenant" value="t1" size="6" /></label>
    <label>input ref <input id="inputRef" size="34" placeholder="file:///..." /></label>
    <button id="save">Save</button>
    <button id="run">Run</button>
    <span id="status" class="status"></span>
  </header>
  <main>
    <aside id="palette">
      <h2>modules</h2>
      <div class="group"><h3>sources</h3><div id="sources"></div></div>
      <div class="group"><h3>steps</h3><div id="steps"></div></div>
      <div class="group"><h3>sinks</h3><div id="sinks"></div></div>
      <p class="hint">click a step to append it to the pipeline</p>
    </aside>
    <section id="canvas">
      <svg id="edges"></svg>
      <div id="nodes"></div>
    </section>
  </main>
  <footer>
    <div id="usage" class="usage">usage: --</div>
    <ol id="log"></ol>
  </footer>
  <script src="/ui/app.js"></script>
</body>
</html>
