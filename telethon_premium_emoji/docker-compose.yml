# Telethon premium-emoji userbot.
#
# First login (once, interactive — asks for phone, code, 2FA password):
#     docker compose run --rm premium-emoji
#   The session is written to the `session` volume below.
#
# Then run it in the background (silent login from the saved session):
#     docker compose up -d --build
#
# Because the session lives on a named volume, it survives container restarts
# and machine shutdowns — you never log in a second time.

services:
  premium-emoji:
    build: .
    image: telethon-premium-emoji
    restart: unless-stopped
    env_file:
      - .env                       # TELEGRAM_API_ID / TELEGRAM_API_HASH / etc.
    environment:
      TELEGRAM_SESSION_FILE: /data/telethon_premium_emoji
    volumes:
      - session:/data             # persists the .session file across restarts
    stdin_open: true               # needed only for the first interactive login
    tty: true

volumes:
  session:
