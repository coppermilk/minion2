# Build the one shared image and publish it to GHCR, so the NAS pulls
# a ready image instead of compiling torch itself. Every branch/PR
# BUILDS the image (proving it still compiles -- the gap that let a
# broken Dockerfile reach main once); only main also PUSHES it to
# ghcr.io/coppermilk/minion2. The GHA layer cache keeps the heavy
# dependency layer warm, so a code-only change ships just the code.
# After each publish, old GHCR package versions AND old workflow runs
# are pruned so nothing piles up (the NAS only ever pulls :latest).
name: image

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write  # to delete old workflow runs after a publish
    env:
      PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      # Don't upload the per-build .dockerbuild record artifact or the
      # job summary -- they only pile up in Actions storage.
      DOCKER_BUILD_SUMMARY: 'false'
      DOCKER_BUILD_RECORD_UPLOAD: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Prune stale GHCR versions after a publish: keep the few most
      # recent (:latest + a couple of SHA tags), delete the rest.
      - if: env.PUBLISH == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: minion2
          package-type: container
          min-versions-to-keep: 5
          delete-only-pre-release-versions: false
      # Prune old workflow-run history: keep the 25 most recent runs of
      # each workflow, delete the rest (the current run is newest, safe).
      - if: env.PUBLISH == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 25;
            for (const wf of ['ci.yml', 'image.yml']) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                { owner: context.repo.owner, repo: context.repo.repo,
                  workflow_id: wf, per_page: 100 },
              );
              for (const run of runs.slice(keep)) {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner, repo: context.repo.repo,
                  run_id: run.id,
                });
              }
            }
