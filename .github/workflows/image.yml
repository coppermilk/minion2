# Build the one shared image and publish it to GHCR, so the NAS pulls
# a ready image instead of compiling torch itself. Every branch/PR
# BUILDS the image (proving it still compiles -- the gap that let a
# broken Dockerfile reach main once); only main also PUSHES it to
# ghcr.io/coppermilk/minion2. The GHA layer cache keeps the heavy
# dependency layer warm, so a code-only change ships just the code.
# After each publish, old package versions are pruned so the registry
# does not pile up (the NAS only ever pulls :latest).
name: image

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Prune stale versions after a publish: keep the few most recent
      # (:latest + a couple of SHA tags), delete the rest.
      - if: env.PUBLISH == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: minion2
          package-type: container
          min-versions-to-keep: 5
          delete-only-pre-release-versions: false
