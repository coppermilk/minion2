# One image, N containers on one mount (BLUEPRINT 14).
# DRIVE_NAS points at the media tree on the host; .env holds secrets.
# Each Telegram bot runs its own identity (TG_TOKEN_<BOT>): Telegram
# allows exactly one getUpdates consumer per token.
#
# All containers share the same /data bind mount, so they share one
# regen/_embeddings.npz -- writes are atomic (tmp + replace) and the
# cache rebuilds its key set from the live tree, so concurrent
# containers stay consistent (OPERATIONS 4).
#
# Idle economy: long-poll and folder waits block (no busy loops),
# sort exits fast when idle, and the mem_limit below caps what a busy
# model run may take. No cpus: caps -- the Synology kernel ships no
# CFS bandwidth controller, so a NanoCPUs limit is rejected at create
# ("kernel does not support CPU CFS scheduler"); memory is the cap
# that matters for torch anyway. Logs rotate so TELEMETRY stays bounded.
#
# print and catch are deliberately NOT services here: the printer
# and the Downloads folder live on the Windows machine
# (deploy/windows/). Each bot runs in exactly one place -- a second
# print/ watcher would print every PDF twice.

# The image is built on GitHub and published to GHCR (image.yml); the
# NAS only `docker compose pull`s it -- there is deliberately no
# `build:` here, so a project can ONLY run the published image and can
# never start compiling torch on the NAS. To build locally for dev:
# docker build -t ghcr.io/coppermilk/minion2:latest -f docker/Dockerfile .
x-minion: &minion
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  env_file: .env
  environment: &minion-env
    DRIVE: /data
    TORCH_HOME: /data/bots/_data/regen/torch
    HF_HOME: /data/bots/_data/regen/hf
  volumes:
    - ${DRIVE_NAS}:/data
  restart: unless-stopped
  init: true
  # No container may gain more privilege than it starts with (blocks
  # setuid escalation). We deliberately do NOT force a non-root USER or
  # cap_drop here: the containers write into a Synology bind mount whose
  # files are owned by the DSM user, and a fixed in-container uid would
  # break those writes. Add `user:` + `cap_drop: [ALL]` per host once
  # the mount's ownership is pinned.
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

services:
  # "gem": the local model server (Qwen2.5-VL). sort and props reach it
  # at http://ollama:11434 on the compose network; no host port is
  # exposed. Weights live in the `ollama-models` named volume (declared
  # at the bottom): Docker auto-creates it -- unlike a bind mount, which
  # fails if the host subpath is missing -- and `image prune` never
  # touches volumes, so the model persists across updates. One-time pull:
  #   docker compose exec ollama ollama pull qwen2.5vl:7b
  # Memory: the 7B model stays resident (~6 GB on the 16 GB NAS) --
  # fine as long as the torch bots (censor/sort) do not all peak at
  # once. On the DS224+ CPU (no AVX2) one classify runs in minutes; a
  # model that is down just leaves images waiting in _inbox (the punt).
  ollama:
    image: ollama/ollama
    environment:
      # Unload the model 5 min after its last use, freeing its RAM (the
      # 7B is ~6 GB) whenever the backend is Gemini or the queue is idle.
      # The first call after an idle stretch pays a cold reload.
      OLLAMA_KEEP_ALIVE: '5m'
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 10g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  inbox:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_INBOX:-}
    command: python -m minions.inbox.main
    mem_limit: 512m

  # Link bots refresh extractors on every start (OPERATIONS 3).
  fetch:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FETCH:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.fetch.main'
    mem_limit: 1g

  frames:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FRAMES:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.frames.main'
    mem_limit: 1g

  # fan-save parks downloads in bots/fan-save/done/ for later work.
  fan-save:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FAN_SAVE:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.fan_save.main'
    mem_limit: 1g

  # The censor family: one Telegram identity per behaviour; the
  # torch detector loads lazily on the first photo, hence the caps.
  censor-blur:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_CENSOR_BLUR:-}
    command: python -m minions.censor_blur.main
    mem_limit: 4g

  censor-black:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_CENSOR_BLACK:-}
    command: python -m minions.censor_black.main
    mem_limit: 4g

  restore:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_RESTORE:-}
    command: python -m minions.restore.main
    mem_limit: 4g

  # sort runs as a watch daemon: Downloads/_inbox sort instantly
  # (SORT_WATCH axis); it may load CLIP when there is work.
  sort:
    <<: *minion
    environment:
      <<: *minion-env
      SORT_WATCH: '1'
    command: python -m minions.sort.main
    mem_limit: 4g
    depends_on:
      - ollama

  # model-switch: flip the classify/props backend from chat (local Qwen
  # <-> Gemini). No model of its own, so no ollama dependency.
  model-switch:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_MODEL_SWITCH:-}
    command: python -m minions.model_switch.main
    mem_limit: 256m

  # props: scenario -> recommended props, checked against the Pr* library
  # (loads CLIP; asks the active backend to list props).
  props:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_PROPS:-}
    command: python -m minions.props.main
    mem_limit: 4g
    depends_on:
      - ollama

  # week-clean rides cron; the foreground cron is the supervisor.
  batch:
    <<: *minion
    command: sh -c 'env | grep -E "DRIVE|TORCH|HF|TG_|GEMINI" > /etc/minions.env; exec cron -f'
    mem_limit: 512m

# Ollama's model blobs: a disposable, re-pullable CACHE. A named volume
# (Docker auto-creates it) rather than a bind, so a missing host subpath
# can never fail the start; `image prune` never touches volumes.
volumes:
  ollama-models:
