# One project, total separation of Telegram from the processing IP.
#
#   * telegram  -- ONE clean container that owns every media-bot's Telegram
#     identity. It holds NO processing code: each dock just receives a file
#     (or link) and POSTs it to a service over HTTP, then sends the bytes
#     back (minions/telegram/main.py -> minions.telegram.relay -> CallService).
#   * svc-*      -- the processing IP, one atomic web service per Step, bytes
#     in / bytes out (the same one image). No Telegram here. Callable by
#     the telegram container, by React Flow, by any HTTP/MCP client.
#   * reactflow -- another web consumer of the same svc-*.
#
# The remaining bots are not file-processors coupled to Telegram, so they
# stay as they are: inbox (ingest, no IP), moderator/props (chat commands),
# sort/batch (folder watch + cron), ollama (the local model).
#
# DRIVE_NAS points at the media tree on the host; .env holds secrets. print
# and catch are NOT here: they live on the Windows machine.
#
# Images are built on GitHub and published to GHCR (image.yml); the NAS only
# `docker compose pull`s. svc-* carry a `build:` for local dev (`up --build`);
# pull_policy: missing means the NAS never builds. Base image local build:
# docker build -t ghcr.io/coppermilk/minion2:latest -f docker/Dockerfile .
x-minion: &minion
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  env_file: .env
  environment: &minion-env
    DRIVE: /data
    TORCH_HOME: /data/bots/_data/regen/torch
    HF_HOME: /data/bots/_data/regen/hf
  volumes:
    - ${DRIVE_NAS}:/data
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

# Atomic service: one Step, one container, bytes in / bytes out. Stateless
# (a fresh temp store per request), so no /data mount. The command picks the
# Step (python -m minions.svc.<name>.service), SKIN the facade (http | mcp).
# Rides the same one image as the bots -- the web layer is baked in.
x-service: &svc
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment: &svc-env
    SKIN: http
  # A small logs-only volume (NOT /data): each service writes
  # /logs/<step>.log, so svc logs are readable as files, not just via
  # docker logs. Independent of DRIVE_NAS, so a missing media mount never
  # takes a stateless service down.
  volumes:
    - svc-logs:/logs
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

services:
  # "gem": the local model server (Qwen2.5-VL) for sort and props.
  ollama:
    image: ollama/ollama
    environment:
      OLLAMA_KEEP_ALIVE: '5m'
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 10g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Atomic services (svc-*): the processing IP, pure web, no Telegram
  svc-censor-blur:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.censor_blur.service
    ports:
      - "${SVC_CENSOR_BLUR_PORT:-8091}:8000"
    mem_limit: 4g

  svc-censor-black:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.censor_black.service
    ports:
      - "${SVC_CENSOR_BLACK_PORT:-8092}:8000"
    mem_limit: 4g

  # Full restore (blur people + LLM repaint); needs Gemini, so it reads .env.
  svc-restore:
    <<: *svc
    env_file: .env
    environment:
      <<: *svc-env
    command: python -m minions.svc.restore.service
    ports:
      - "${SVC_RESTORE_PORT:-8093}:8000"
    mem_limit: 4g

  # Full frames (fetch a link or pass a file, then extract). A folder of
  # frames comes back as one zip (see services/http.py).
  svc-frames:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.frames.service
    ports:
      - "${SVC_FRAMES_PORT:-8094}:8000"
    mem_limit: 2g

  # Link -> video (yt-dlp). Serves both the fetch and fan-save docks.
  svc-fetch:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.fetch.service
    ports:
      - "${SVC_FETCH_PORT:-8095}:8000"
    mem_limit: 1g

  # --- The one Telegram container: all media docks, zero processing IP.
  # Each bot in TELEGRAM_BOTS runs its own relay belt (own token) and calls
  # its SERVICE_URL_* over HTTP. Tokens come from .env.
  telegram:
    <<: *minion
    environment:
      <<: *minion-env
      TELEGRAM_BOTS: censor-blur,censor-black,restore,frames,fetch,fan-save
      SERVICE_URL_CENSOR_BLUR: http://svc-censor-blur:8000
      SERVICE_URL_CENSOR_BLACK: http://svc-censor-black:8000
      SERVICE_URL_RESTORE: http://svc-restore:8000
      SERVICE_URL_FRAMES: http://svc-frames:8000
      SERVICE_URL_FETCH: http://svc-fetch:8000
      SERVICE_URL_FAN_SAVE: http://svc-fetch:8000
      RELAY_DOCK_FRAMES: any
      RELAY_DOCK_FETCH: links
      RELAY_DOCK_FAN_SAVE: links
    command: python -m minions.telegram.main
    mem_limit: 1g
    depends_on:
      - svc-censor-blur
      - svc-censor-black
      - svc-restore
      - svc-frames
      - svc-fetch

  # --- Monolith bots (not file-processors coupled to Telegram)
  inbox:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_INBOX:-}
    command: python -m minions.bots.inbox.main
    mem_limit: 512m

  sort:
    <<: *minion
    environment:
      <<: *minion-env
      SORT_WATCH: '1'
    command: python -m minions.bots.sort.main
    mem_limit: 4g
    depends_on:
      - ollama

  moderator:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_MODERATOR:-}
    command: python -m minions.bots.moderator.main
    mem_limit: 256m

  props:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_PROPS:-}
    command: python -m minions.bots.props.main
    mem_limit: 4g
    depends_on:
      - ollama

  # donations: poll a donation platform (Streamlabs today; the feed is
  # platform-agnostic, so Revolut and others slot in later) and post each
  # new donor alert -- who gave, how much, and their question -- to
  # DONATION_CHAT, in Russian. No model of its own, so no ollama
  # dependency; unconfigured (no token/chat) it idles harmlessly.
  donations:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_DONATIONS:-}
    command: python -m minions.bots.donations.main
    mem_limit: 256m

  # week-clean and wishlist ride cron; the foreground cron is the
  # supervisor. WISHLIST is grepped in too so the wishlist bot's URL and
  # target chat reach the cron environment alongside DRIVE and the tokens.
  batch:
    <<: *minion
    command: sh -c 'env | grep -E "DRIVE|TORCH|HF|TG_|GEMINI|WISHLIST" > /etc/minions.env; exec cron -f'
    mem_limit: 512m

  # --- Web consumers of the services (separate containers, one project)
  # React Flow canvas placeholder: a static page that will call the svc-*
  # over the web. Swap the mounted dir for the built app when it exists.
  reactflow:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${REACTFLOW_PORT:-8088}:80"
    volumes:
      - ./deploy/reactflow:/usr/share/nginx/html:ro

  # aggregator: a Telethon USER account (not a bot-token minion) -- the only
  # kind that may send premium emoji. It listens to a source chat, groups a
  # Short's per-platform links, and posts the collected message to one or more
  # target chats. It rides the ONE shared image now: telethon is baked in
  # (pyproject `tg` extra), so there is no separate image to build.
  #
  # Config lives in .env: SOURCE_CHAT_ID, TARGET_CHAT_ID (comma-separated for
  # several chats), plus TELEGRAM_API_ID / TELEGRAM_API_HASH (my.telegram.org).
  # The session is a FILE on the shared /data mount, so a one-time login (or a
  # session file generated on Windows and dropped at
  # /data/bots/aggregator/telethon.session) survives restarts and shutdowns --
  # no rebuild. Same base name as the bare-run default (telethon.session), so a
  # file generated on Windows drops straight in -- no rename. First login
  # (once): docker compose run --rm aggregator, then
  # `docker compose up -d aggregator` runs it silently.
  aggregator:
    <<: *minion
    environment:
      <<: *minion-env
      TELEGRAM_SESSION_FILE: /data/bots/aggregator/telethon
      AGGREGATOR_STATE_DIR: /data/bots/aggregator
    command: python -m minions.aggregator.main
    stdin_open: true            # for the one-time interactive login
    tty: true
    mem_limit: 256m

# Ollama's model blobs: a disposable, re-pullable CACHE. A named volume
# (Docker auto-creates it) rather than a bind, so a missing host subpath
# can never fail the start; `image prune` never touches volumes.
volumes:
  ollama-models:
  svc-logs:
