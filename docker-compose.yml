# One project, three kinds of container (BLUEPRINT 14):
#   1. Telegram bots (monoliths)  -- image minion2, one TG identity each.
#   2. Atomic services (svc-*)    -- image minion2-service, one Step each,
#      bytes in / bytes out over HTTP+MCP; stateless, no volume.
#   3. Thin transports (tg-*)      -- image minion2, a Telegram dock that
#      POSTs the file to its svc-* and sends the bytes back (no torch here).
# Plus n8n and a React Flow placeholder: web consumers of the same svc-*.
#
# The split (tg-* + svc-*) is applied only where it is lossless: the pixel
# transforms censor-blur, censor-black and restore (the work IS the bytes,
# identical OUT side; svc-restore runs the full blur + LLM-repaint chain).
# inbox (canonical rename), fetch (chat/queue routing), fan-save (parking)
# and frames (folder-of-frames output) do not reduce to bytes in / bytes out
# without changing behaviour, so they stay monoliths.
#
# DRIVE_NAS points at the media tree on the host; .env holds secrets. All
# containers share the same /data bind mount (atomic writes; OPERATIONS 4).
# print and catch are NOT here: they live on the Windows machine.
#
# The images are built on GitHub and published to GHCR (image.yml); the NAS
# only `docker compose pull`s them. svc-* carry a `build:` for local dev
# (`up --build`); pull_policy: missing means the NAS never builds. Base
# image local build: docker build -t ghcr.io/coppermilk/minion2:latest \
#   -f docker/Dockerfile .
x-minion: &minion
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  env_file: .env
  environment: &minion-env
    DRIVE: /data
    TORCH_HOME: /data/bots/_data/regen/torch
    HF_HOME: /data/bots/_data/regen/hf
  volumes:
    - ${DRIVE_NAS}:/data
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

# Atomic service: one Step, one container, bytes in / bytes out. Stateless
# (a fresh temp store per request), so no /data mount. STEP picks the Step,
# SKIN the facade (http | mcp). Rides the published minion2-service image.
x-service: &svc
  image: ghcr.io/coppermilk/minion2-service:latest
  pull_policy: missing
  build:
    context: .
    dockerfile: services/Dockerfile
  environment: &svc-env
    SKIN: http
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

services:
  # "gem": the local model server (Qwen2.5-VL) for sort and props.
  ollama:
    image: ollama/ollama
    environment:
      OLLAMA_KEEP_ALIVE: '5m'
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 10g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Telegram bots (monoliths): work that does not reduce to bytes in/out
  inbox:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_INBOX:-}
    command: python -m minions.inbox.main
    mem_limit: 512m

  fetch:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FETCH:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.fetch.main'
    mem_limit: 1g

  frames:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FRAMES:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.frames.main'
    mem_limit: 1g

  fan-save:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_FAN_SAVE:-}
    command: sh -c 'yt-dlp -U; exec python -m minions.fan_save.main'
    mem_limit: 1g

  sort:
    <<: *minion
    environment:
      <<: *minion-env
      SORT_WATCH: '1'
    command: python -m minions.sort.main
    mem_limit: 4g
    depends_on:
      - ollama

  model-switch:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_MODEL_SWITCH:-}
    command: python -m minions.model_switch.main
    mem_limit: 256m

  props:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_PROPS:-}
    command: python -m minions.props.main
    mem_limit: 4g
    depends_on:
      - ollama

  batch:
    <<: *minion
    command: sh -c 'env | grep -E "DRIVE|TORCH|HF|TG_|GEMINI" > /etc/minions.env; exec cron -f'
    mem_limit: 512m

  # --- Atomic services (svc-*): bytes in / bytes out, callable by anything
  svc-censor-blur:
    <<: *svc
    environment:
      <<: *svc-env
      STEP: censor-blur
    ports:
      - "${SVC_CENSOR_BLUR_PORT:-8091}:8000"
    mem_limit: 4g

  svc-censor-black:
    <<: *svc
    environment:
      <<: *svc-env
      STEP: censor-black
    ports:
      - "${SVC_CENSOR_BLACK_PORT:-8092}:8000"
    mem_limit: 4g

  # The full restore pipeline (blur people + LLM repaint). Needs Gemini, so
  # it reads .env (GEMINI_API_KEY); unlike the offline services it calls out.
  svc-restore:
    <<: *svc
    env_file: .env
    environment:
      <<: *svc-env
      STEP: restore
    ports:
      - "${SVC_RESTORE_PORT:-8093}:8000"
    mem_limit: 4g

  # --- Thin Telegram transports (tg-*): dock -> svc-* over HTTP -> chat
  tg-censor-blur:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_CENSOR_BLUR:-}
      SERVICE_URL: http://svc-censor-blur:8000
      RELAY_NAME: censor-blur
    command: python -m minions.relay.main
    mem_limit: 512m
    depends_on:
      - svc-censor-blur

  tg-censor-black:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_CENSOR_BLACK:-}
      SERVICE_URL: http://svc-censor-black:8000
      RELAY_NAME: censor-black
    command: python -m minions.relay.main
    mem_limit: 512m
    depends_on:
      - svc-censor-black

  tg-restore:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_RESTORE:-}
      SERVICE_URL: http://svc-restore:8000
      RELAY_NAME: restore
    command: python -m minions.relay.main
    mem_limit: 512m
    depends_on:
      - svc-restore

  # --- Web consumers of the services (separate containers, one project)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_SECURE_COOKIE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
    volumes:
      - n8n-data:/home/node/.n8n

  # React Flow canvas placeholder: a static page that will call the svc-*
  # over the web. Swap the mounted dir for the built app when it exists.
  reactflow:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${REACTFLOW_PORT:-8088}:80"
    volumes:
      - ./deploy/reactflow:/usr/share/nginx/html:ro

volumes:
  ollama-models:
  n8n-data:
