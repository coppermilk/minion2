# One project, total separation of Telegram from the processing IP.
#
#   * telegram  -- ONE clean container that owns every media-bot's Telegram
#     identity. It holds NO processing code: each dock just receives a file
#     (or link) and POSTs it to a service over HTTP, then sends the bytes
#     back (minions/telegram/main.py -> minions.telegram.relay -> CallService).
#   * svc-*      -- the processing IP, one atomic web service per Step, bytes
#     in / bytes out (the same one image). No Telegram here. Callable by
#     the telegram container, by n8n, by React Flow, by any HTTP/MCP client.
#   * n8n, reactflow -- more web consumers of the same svc-*.
#
# The remaining bots are not file-processors coupled to Telegram, so they
# stay as they are: inbox (ingest, no IP), model-switch/props (chat commands),
# sort/batch (folder watch + cron), ollama (the local model).
#
# DRIVE_NAS points at the media tree on the host; .env holds secrets. print
# and catch are NOT here: they live on the Windows machine.
#
# Images are built on GitHub and published to GHCR (image.yml); the NAS only
# `docker compose pull`s. svc-* carry a `build:` for local dev (`up --build`);
# pull_policy: missing means the NAS never builds. Base image local build:
# docker build -t ghcr.io/coppermilk/minion2:latest -f docker/Dockerfile .
x-minion: &minion
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  env_file: .env
  environment: &minion-env
    DRIVE: /data
    TORCH_HOME: /data/bots/_data/regen/torch
    HF_HOME: /data/bots/_data/regen/hf
  volumes:
    - ${DRIVE_NAS}:/data
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

# Atomic service: one Step, one container, bytes in / bytes out. Stateless
# (a fresh temp store per request), so no /data mount. The command picks the
# Step (python -m minions.svc.<name>.service), SKIN the facade (http | mcp).
# Rides the same one image as the bots -- the web layer is baked in.
x-service: &svc
  image: ghcr.io/coppermilk/minion2:latest
  pull_policy: missing
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment: &svc-env
    SKIN: http
  # A small logs-only volume (NOT /data): each service writes
  # /logs/<step>.log, so svc logs are readable as files, not just via
  # docker logs. Independent of DRIVE_NAS, so a missing media mount never
  # takes a stateless service down.
  volumes:
    - svc-logs:/logs
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'

services:
  # "gem": the local model server (Qwen2.5-VL) for sort and props.
  ollama:
    image: ollama/ollama
    environment:
      OLLAMA_KEEP_ALIVE: '5m'
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 10g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Atomic services (svc-*): the processing IP, pure web, no Telegram
  svc-censor-blur:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.censor_blur.service
    ports:
      - "${SVC_CENSOR_BLUR_PORT:-8091}:8000"
    mem_limit: 4g

  svc-censor-black:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.censor_black.service
    ports:
      - "${SVC_CENSOR_BLACK_PORT:-8092}:8000"
    mem_limit: 4g

  # Full restore (blur people + LLM repaint); needs Gemini, so it reads .env.
  svc-restore:
    <<: *svc
    env_file: .env
    environment:
      <<: *svc-env
    command: python -m minions.svc.restore.service
    ports:
      - "${SVC_RESTORE_PORT:-8093}:8000"
    mem_limit: 4g

  # Full frames (fetch a link or pass a file, then extract). A folder of
  # frames comes back as one zip (see services/http.py).
  svc-frames:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.frames.service
    ports:
      - "${SVC_FRAMES_PORT:-8094}:8000"
    mem_limit: 2g

  # Link -> video (yt-dlp). Serves both the fetch and fan-save docks.
  svc-fetch:
    <<: *svc
    environment:
      <<: *svc-env
    command: python -m minions.svc.fetch.service
    ports:
      - "${SVC_FETCH_PORT:-8095}:8000"
    mem_limit: 1g

  # --- The one Telegram container: all media docks, zero processing IP.
  # Each bot in TELEGRAM_BOTS runs its own relay belt (own token) and calls
  # its SERVICE_URL_* over HTTP. Tokens come from .env.
  telegram:
    <<: *minion
    environment:
      <<: *minion-env
      TELEGRAM_BOTS: censor-blur,censor-black,restore,frames,fetch,fan-save
      SERVICE_URL_CENSOR_BLUR: http://svc-censor-blur:8000
      SERVICE_URL_CENSOR_BLACK: http://svc-censor-black:8000
      SERVICE_URL_RESTORE: http://svc-restore:8000
      SERVICE_URL_FRAMES: http://svc-frames:8000
      SERVICE_URL_FETCH: http://svc-fetch:8000
      SERVICE_URL_FAN_SAVE: http://svc-fetch:8000
      RELAY_DOCK_FRAMES: any
      RELAY_DOCK_FETCH: links
      RELAY_DOCK_FAN_SAVE: links
    command: python -m minions.telegram.main
    mem_limit: 1g
    depends_on:
      - svc-censor-blur
      - svc-censor-black
      - svc-restore
      - svc-frames
      - svc-fetch

  # --- Monolith bots (not file-processors coupled to Telegram)
  inbox:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_INBOX:-}
    command: python -m minions.bots.inbox.main
    mem_limit: 512m

  sort:
    <<: *minion
    environment:
      <<: *minion-env
      SORT_WATCH: '1'
    command: python -m minions.bots.sort.main
    mem_limit: 4g
    depends_on:
      - ollama

  model-switch:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_MODEL_SWITCH:-}
    command: python -m minions.bots.model_switch.main
    mem_limit: 256m

  props:
    <<: *minion
    environment:
      <<: *minion-env
      TG_TOKEN: ${TG_TOKEN_PROPS:-}
    command: python -m minions.bots.props.main
    mem_limit: 4g
    depends_on:
      - ollama

  batch:
    <<: *minion
    command: sh -c 'env | grep -E "DRIVE|TORCH|HF|TG_|GEMINI" > /etc/minions.env; exec cron -f'
    mem_limit: 512m

  # --- Web consumers of the services (separate containers, one project)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_SECURE_COOKIE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
    volumes:
      - n8n-data:/home/node/.n8n

  # React Flow canvas placeholder: a static page that will call the svc-*
  # over the web. Swap the mounted dir for the built app when it exists.
  reactflow:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${REACTFLOW_PORT:-8088}:80"
    volumes:
      - ./deploy/reactflow:/usr/share/nginx/html:ro

volumes:
  ollama-models:
  n8n-data:
  svc-logs:
